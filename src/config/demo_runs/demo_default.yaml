# =========================
# Provider (LLM)
# =========================
#provider:
#  name: openai
#  model: gpt-4o-mini
#  temperature: 0.0
#  max_tokens: 200
provider:
  name: hf_local
  model: meta-llama/Llama-3.1-8B-Instruct
  temperature: 0.0
  max_tokens: 200

# =========================
# Agent settings
# =========================
agent:
  headless: true


# =========================
# Environment (BrowserGym)
# =========================
env:
  start_url: "https://www.google.com"
  goal: "Go to Gmail by clicking the link"
  n_steps: 1
  headless: false
  record_video: true
  task_seed: null


# =========================
# Trigger (optional attack)
# =========================
trigger:
  path: null
  # Example:
  # path: data/triggers/google_search_2026-04-05_04-48-41.json


# =========================
# Experiment metadata
# =========================
experiment:
  name: "demo_run"
  results_dir: "./results"