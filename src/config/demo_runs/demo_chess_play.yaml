# =========================
# Provider (LLM)
# =========================
#provider:
#  name: openai
#  model: gpt-4o-mini
#  temperature: 0.0
#  max_tokens: 200
provider:
  name: hf_local
  model: meta-llama/Llama-3.1-8B-Instruct
  temperature: 0.0
  max_tokens: 200

# =========================
# Agent settings
# =========================
agent:
  headless: true


# =========================
# Environment (BrowserGym)
# =========================
env:
  start_url: "https://www.chess.com/play"
  goal: "Challenge a friend to a timed chess match"
  n_steps: 1
  headless: true
  record_video: true
  task_seed: null


# =========================
# Trigger (optional attack)
# =========================
trigger:
  path: null


# =========================
# Experiment metadata
# =========================
experiment:
  name: "demo_run" #default name
  results_dir: "./results"