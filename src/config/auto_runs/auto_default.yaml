# =========================
# Provider (LLM)
# =========================
provider:
  name: hf_local
  model: meta-llama/Llama-3.1-8B-Instruct
  temperature: 0.0
  max_tokens: 200

# =========================
# Agent settings
# =========================
agent:
  headless: true

# =========================
# Environment (BrowserGym)
# =========================

# ************************************************************************************ TO BE OVERRIDDEN IN AUTO RUNS ***
env:
  start_url: "https://www.example.com"
  goal: "Find out more information about this domain"
  n_steps: 1
  headless: false
  record_video: true
  task_seed: null


# =========================
# Trigger (optional attack)
# =========================
trigger:
  path: null


# =========================
# Experiment metadata
# =========================
experiment:
  name: "auto_run"
  results_dir: "./results"